name: Courtside
options:
  bundleIdPrefix: com.xciv
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true

schemes:
  Courtside:
    build:
      targets:
        Courtside: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - CourtsideTests
        - CourtsideUITests
    archive:
      config: Release

settings:
  base:
    SWIFT_VERSION: "5.9"
    TARGETED_DEVICE_FAMILY: "1,2"
    GENERATE_INFOPLIST_FILE: true
    INFOPLIST_KEY_UILaunchScreen_Generation: true
    INFOPLIST_KEY_UISupportedInterfaceOrientations: UIInterfaceOrientationPortrait
    INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
    INFOPLIST_KEY_CFBundleDisplayName: Courtside
    ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor

targets:
  Courtside:
    type: application
    platform: iOS
    sources:
      - path: Courtside
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.xciv.courtside
        MARKETING_VERSION: "1.1"
        CURRENT_PROJECT_VERSION: 2
        INFOPLIST_KEY_NSCameraUsageDescription: "Courtside uses your camera to scan roster sheets"
        INFOPLIST_KEY_NSPhotoLibraryUsageDescription: "Courtside accesses your photos to scan roster sheets"
        DEVELOPMENT_TEAM: ""
        CODE_SIGN_ENTITLEMENTS: Courtside/Courtside.entitlements

  CourtsideTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: CourtsideTests
    dependencies:
      - target: Courtside
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.xciv.courtside.tests

  CourtsideUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: CourtsideUITests
    dependencies:
      - target: Courtside
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.xciv.courtside.uitests
